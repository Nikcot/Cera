<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цера</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="popup-container">
        <!-- Header -->
        <header class="popup-header">
            <div class="logo-row">
                <div class="logo-mark">
                    <span class="logo-letter">Ц</span>
                    <span class="logo-dot"></span>
                </div>
                <div class="logo-text">
                    <h1>Цера</h1>
                    <p class="tagline">AI конспект</p>
                </div>
            </div>
        </header>

        <!-- Status -->
        <div class="status-section" id="statusSection">
            <div class="pulse-ring" id="pulseRing">
                <div class="pulse-core" id="pulseCore"></div>
            </div>
            <span class="status-label" id="statusLabel">Готово к записи</span>
        </div>

        <!-- Main Controls -->
        <div class="controls-section">
            <!-- Source selector -->
            <div class="source-selector">
                <button class="source-btn active" id="btnTabAudio" data-source="tab" title="Звук вкладки">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="14" rx="2" />
                        <path d="M7 21h10" />
                        <path d="M12 17v4" />
                    </svg>
                    <span>Вкладка</span>
                </button>
                <button class="source-btn" id="btnMicAudio" data-source="mic" title="Микрофон">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="2" width="6" height="12" rx="3" />
                        <path d="M5 10a7 7 0 0 0 14 0" />
                        <path d="M12 18v4" />
                        <path d="M8 22h8" />
                    </svg>
                    <span>Микрофон</span>
                </button>
            </div>

            <!-- Record Button -->
            <button class="record-btn" id="recordBtn">
                <div class="record-btn-inner" id="recordBtnInner">
                    <svg class="mic-icon" id="micIcon" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <rect x="9" y="2" width="6" height="12" rx="3" />
                        <path d="M5 10a7 7 0 0 0 14 0" />
                        <path d="M12 18v4" />
                        <path d="M8 22h8" />
                    </svg>
                    <svg class="stop-icon hidden" id="stopIcon" width="24" height="24" viewBox="0 0 24 24"
                        fill="currentColor">
                        <rect x="6" y="6" width="12" height="12" rx="2" />
                    </svg>
                </div>
            </button>
            <p class="record-hint" id="recordHint">Нажмите для записи</p>

            <!-- Timer -->
            <div class="timer-row hidden" id="timerRow">
                <div class="timer-dot"></div>
                <span class="timer-value" id="timerValue">00:00</span>
                <span class="timer-sep">·</span>
                <span class="word-count" id="wordCount">0 слов</span>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <button class="action-btn" id="btnOpenPanel" title="Открыть панель">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <path d="M15 3v18" />
                </svg>
                <span>Панель</span>
            </button>
            <button class="action-btn" id="btnCopyText" title="Копировать текст">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" />
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                </svg>
                <span>Копировать</span>
            </button>
            <button class="action-btn" id="btnSettings" title="Настройки">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83" />
                </svg>
                <span>Настройки</span>
            </button>
        </div>

        <!-- Settings Panel (hidden by default) -->
        <div class="settings-panel hidden" id="settingsPanel">
            <div class="settings-header">
                <h3>Настройки</h3>
                <button class="close-settings" id="btnCloseSettings">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="setting-item">
                <label class="setting-label">Gemini API Key</label>
                <input type="password" class="setting-input" id="apiKeyInput" placeholder="AIza...">
                <p class="setting-hint">Получите ключ на <a href="https://aistudio.google.com/apikey"
                        target="_blank">aistudio.google.com</a></p>
            </div>
            <div class="setting-item">
                <label class="setting-label">Модель Whisper</label>
                <div class="setting-input"
                    style="display:flex;align-items:center;gap:8px;cursor:default;background:var(--bg-primary);">
                    <div class="sp-status-dot" id="modelDot"></div>
                    <span id="modelStatus" style="font-size:12px;color:var(--text-secondary)">Проверка...</span>
                </div>
                <p class="setting-hint">Модель base загрузится браузером (~150 МБ)</p>
            </div>
            <div class="setting-item">
                <label class="setting-label">Интервал AI саммари</label>
                <select class="setting-select" id="summaryInterval">
                    <option value="60">1 минута</option>
                    <option value="180" selected>3 минуты</option>
                    <option value="300">5 минут</option>
                    <option value="0">Только вручную</option>
                </select>
            </div>
            <button class="save-settings-btn" id="btnSaveSettings">Сохранить</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
